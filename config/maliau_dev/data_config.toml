[core.grid]
grid_type = "square"
cell_area = 10000
cell_nx = 50
cell_ny = 50
xoff = -50
yoff = -50

[core.layers]
soil_layers = [
    -0.25,
    -1.0,
]
canopy_layers = 10
above_canopy_height_offset = 2.0
subcanopy_layer_height = 1.5
surface_layer_height = 0.1

[core.timing]
start_date = "2010-01-01"
update_interval = "1 month"
run_length = "11 years"

[core.data_output_options]
save_initial_state = true

# Climate data
[[core.data.variable]]
file_path = "../data/era5_maliau_2010_2020_100m.nc"
var_name = "air_temperature_ref"
